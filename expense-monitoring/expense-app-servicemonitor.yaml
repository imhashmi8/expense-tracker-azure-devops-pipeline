apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: expense-app
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: expense-app
  namespaceSelector:
    matchNames:
      - production
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
