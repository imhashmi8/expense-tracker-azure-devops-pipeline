trigger:
  branches:
    include:
      - main
  paths:
    include:
      - expense-app/*
      - expense-app/**
      - expense-deploy/*
      - expense-deploy/**
      - .azuredevops/pipelines/app-ci.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - expense-app/*
      - expense-app/**
      - expense-deploy/*
      - expense-deploy/**
      - .azuredevops/pipelines/app-ci.yml

variables:
  - name: azureServiceConnection
    value: sc-expenseflow-azure
  - name: imageTag
    value: $(Build.BuildId)

pool:
  name: Default
  demands:
    - Agent.Name -equals devops-self-hosted-agent

stages:
  - stage: BuildAndPush
    displayName: Build and push app images
    jobs:
      - job: BuildAndPush
        steps:
          - checkout: self
            fetchDepth: 0

          - task: AzureCLI@2
            displayName: Build and push backend/frontend images
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail

                az version
                helm version

                echo "Validating Helm chart before image build..."
                helm lint expense-deploy/helm/expenseflow

                echo "Building backend image for dev ACR..."
                az acr build --registry expenseflowdevacr --image expenseflow-backend:$(imageTag) ./expense-app/backend

                echo "Building frontend image for dev ACR..."
                az acr build --registry expenseflowdevacr --image expenseflow-frontend:$(imageTag) ./expense-app/frontend

                echo "Building backend image for prod ACR..."
                az acr build --registry expenseflowprodacr --image expenseflow-backend:$(imageTag) ./expense-app/backend

                echo "Building frontend image for prod ACR..."
                az acr build --registry expenseflowprodacr --image expenseflow-frontend:$(imageTag) ./expense-app/frontend

                mkdir -p $(Build.ArtifactStagingDirectory)
                echo $(imageTag) > $(Build.ArtifactStagingDirectory)/image-tag.txt

          - publish: $(Build.ArtifactStagingDirectory)/image-tag.txt
            artifact: image-tag
            displayName: Publish image tag artifact
