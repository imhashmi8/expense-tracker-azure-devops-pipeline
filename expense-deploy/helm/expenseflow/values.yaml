namespace: expenseflow

image:
  pullPolicy: IfNotPresent

backend:
  replicaCount: 1
  image:
    repository: your-acr-name.azurecr.io/expenseflow-backend
    tag: latest
  service:
    port: 8000
  resources: {}
  env:
    APP_NAME: ExpenseFlow API
    DEBUG: "false"
    JWT_EXPIRE_MINUTES: "120"
    FRONTEND_ORIGINS: "https://expenseflow-dev.example.com"
    SEED_DEMO_DATA: "false"
    AZURE_BLOB_CONTAINER: expense-receipts
    LOCAL_UPLOADS_DIR: uploads
  secretEnv:
    JWT_SECRET: ""
    DATABASE_URL: ""
    REDIS_URL: ""
    AZURE_BLOB_CONNECTION_STRING: ""

frontend:
  replicaCount: 1
  image:
    repository: your-acr-name.azurecr.io/expenseflow-frontend
    tag: latest
  service:
    port: 3000
  resources: {}
  env:
    NEXT_PUBLIC_API_BASE_URL: "/api"

ingress:
  enabled: true
  className: nginx
  host: ""
  tls:
    enabled: false
    secretName: expenseflow-tls
